{{ define "header" }}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heheserver gallery</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong theme.
      (function () {
        var saved = localStorage.getItem("theme");
        var theme =
          saved ||
          (window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/static/glacialwisp.min.css" />
    <link rel="stylesheet" href="/static/glacialwisp-icons.min.css" />
    <style>
      /* Smooth scrolling and custom focus ring */
      html {
        scroll-behavior: smooth;
      }
      *:focus-visible {
        outline: 2px solid var(--color-primary, #23b0ff);
        outline-offset: 2px;
      }
      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }
      /* Media sizing helpers (no glacialwisp equivalents). */
      .media-frame {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        min-height: 300px;
      }
      .media-contain {
        width: 100%;
        max-height: 70vh;
        object-fit: contain;
      }
      .media-cover {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background: #000;
      }
      /* Masonry fluid-percentage grid. Items float as a rough grid without JS;
         Masonry absolutely-positions them once it initializes. */
      .grid-sizer,
      .grid-item {
        width: 24%;
      }
      .gutter-sizer {
        width: 1.33%;
      }
      .grid-item {
        margin-bottom: 1rem;
        float: left;
      }
      .grid-item .card-image img {
        display: block;
        width: 100%;
        height: auto;
      }
      @media (max-width: 960px) {
        .grid-sizer,
        .grid-item {
          width: 32%;
        }
        .gutter-sizer {
          width: 2%;
        }
      }
      @media (max-width: 600px) {
        .grid-sizer,
        .grid-item {
          width: 49%;
        }
        .gutter-sizer {
          width: 2%;
        }
      }
      @media (max-width: 480px) {
        .grid-sizer,
        .grid-item {
          width: 100%;
        }
      }
      /* Infinite Scroll status. Parent and all three states hidden by default;
         Infinite Scroll reveals the active one via inline display. */
      .page-load-status {
        display: none;
        padding: 1.5rem 0;
        text-align: center;
      }
      .infinite-scroll-request,
      .infinite-scroll-last,
      .infinite-scroll-error {
        display: none;
      }
      /* Visited links should look identical to unvisited ones (issue #22). */
      a:visited {
        color: #23b0ff;
      }
      /* Gallery filter bar. */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        align-items: flex-end;
        margin: 1rem 0 1.5rem;
        padding: 1rem;
        border: 1px solid rgba(128, 128, 128, 0.25);
        border-radius: 0.3rem;
      }
      .filter-field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }
      .filter-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: gray;
      }
      .filter-types {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      .filter-type {
        margin: 0;
        text-transform: capitalize;
      }
      .filter-actions {
        display: flex;
        gap: 0.4rem;
      }
    </style>
  </head>
  <body>
    <div class="container grid-xl" style="padding: 1.5rem 0.5rem">
      <header class="site-header">
        <a href="/" class="h5" style="text-decoration: none">
          heheserver gallery
        </a>
        <button
          type="button"
          class="btn btn-action"
          id="theme-toggle"
          aria-label="Toggle dark mode"
          onclick="(function(){var h=document.documentElement;var n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('theme-toggle').textContent=n==='dark'?'☀️':'🌙';})()"
        ></button>
      </header>
      <script>
        // Match the toggle glyph to the active theme on load.
        document.getElementById("theme-toggle").textContent =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "☀️"
            : "🌙";
      </script>
      {{ end }} {{ define "footer" }}
      <div class="divider" style="margin-top: 2rem"></div>
      <footer class="text-center text-gray" style="padding: 1rem 0">
        <p>
          <a
            href="https://github.com/wsand02/heheserver"
            target="_blank"
            rel="noopener noreferrer"
            >heheserver</a
          >
          gallery {{ version }} - a dynamic gallery able to be setup in any
          directory at any moment
        </p>
      </footer>
    </div>
    <script src="/static/masonry.pkgd.min.js"></script>
    <script src="/static/imagesloaded.pkgd.min.js"></script>
    <script src="/static/infinite-scroll.pkgd.min.js"></script>
    <script>
      (function () {
        var container = document.getElementById("gallery-results");
        if (!container) return; // post.html shares base — no results grid there

        // The filter form lives outside #gallery-results, so it survives the
        // realtime swap and its focused input keeps focus while typing.
        var form = document.querySelector(".filter-bar");
        var msnry = null;
        var infScroll = null;

        // (Re)initialize masonry + infinite scroll on the current grid. Called
        // on first load and after every realtime results swap.
        function initGallery() {
          var grid = container.querySelector(".grid");
          if (!grid) return;
          msnry = new Masonry(grid, {
            itemSelector: ".grid-item",
            columnWidth: ".grid-sizer",
            gutter: ".gutter-sizer",
            percentPosition: true,
          });
          imagesLoaded(grid).on("progress", function () {
            msnry.layout();
          });
          if (container.querySelector(".pagination__next")) {
            var dirPath = grid.getAttribute("data-path") || "";
            var startPage = parseInt(grid.getAttribute("data-page"), 10) || 1;
            // Applied filters (from the server-rendered grid), carried forward
            // so later infinite-scroll pages stay filtered.
            var filterType = grid.getAttribute("data-type") || "";
            var filterQuery = grid.getAttribute("data-query") || "";
            var filterExt = grid.getAttribute("data-ext") || "";
            infScroll = new InfiniteScroll(grid, {
              // Build the next-page URL explicitly from the real page number.
              // A selector/template path makes Infinite Scroll hunt for "the
              // number" in the URL, but digits inside percent-encoded path
              // segments (e.g. %2F, %3F) fool that heuristic and corrupt ?path=.
              path: function () {
                var url =
                  "?path=" +
                  encodeURIComponent(dirPath) +
                  "&p=" +
                  (startPage + this.loadCount + 1);
                // data-type is a comma-joined list; emit one type= per value.
                if (filterType) {
                  filterType.split(",").forEach(function (t) {
                    url += "&type=" + encodeURIComponent(t);
                  });
                }
                if (filterQuery) url += "&q=" + encodeURIComponent(filterQuery);
                if (filterExt) url += "&ext=" + encodeURIComponent(filterExt);
                return url;
              },
              checkLastPage: ".pagination__next", // stop when a page has no Next link
              status: ".page-load-status", // loading / end / error indicator
              append: ".grid-item",
              outlayer: msnry, // appended items get imagesLoaded + masonry.appended()
              history: false,
              hideNav: ".pagination", // hide server pagination once JS drives loading
            });
          }
        }

        // Tear down the current instances before swapping in new results, so we
        // don't leak listeners or stack duplicate InfiniteScroll watchers.
        function destroyGallery() {
          if (infScroll) {
            infScroll.destroy();
            infScroll = null;
          }
          if (msnry) {
            msnry.destroy();
            msnry = null;
          }
        }

        // Build a page-1 gallery URL from the live filter form.
        function formURL() {
          var params = new URLSearchParams();
          params.set("path", form.elements["path"].value);
          Array.prototype.forEach.call(
            form.querySelectorAll('input[name="type"]:checked'),
            function (cb) {
              params.append("type", cb.value);
            }
          );
          var q = form.elements["q"].value.trim();
          if (q) params.set("q", q);
          var ext = form.elements["ext"].value.trim();
          if (ext) params.set("ext", ext);
          return "?" + params.toString();
        }

        // Realtime refetch: pull the filtered gallery and swap in its results.
        // A token guards against out-of-order responses (fast typing).
        var refetchToken = 0;
        function refilter() {
          if (!form) return;
          var url = formURL();
          var token = ++refetchToken;
          container.setAttribute("aria-busy", "true");
          fetch(url, { headers: { "X-Requested-With": "fetch" } })
            .then(function (r) {
              return r.text();
            })
            .then(function (html) {
              if (token !== refetchToken) return; // superseded by a newer request
              var doc = new DOMParser().parseFromString(html, "text/html");
              var fresh = doc.getElementById("gallery-results");
              if (!fresh) return;
              destroyGallery();
              container.innerHTML = fresh.innerHTML;
              initGallery();
              container.removeAttribute("aria-busy");
              // Keep the address bar in sync so the filtered view is shareable
              // and reloadable. replaceState (not push) avoids a history entry
              // per keystroke.
              history.replaceState(null, "", url);
            })
            .catch(function () {
              if (token === refetchToken) container.removeAttribute("aria-busy");
            });
        }

        var debounceTimer;
        function debouncedRefilter() {
          clearTimeout(debounceTimer);
          debounceTimer = setTimeout(refilter, 200);
        }

        if (form) {
          // The form still submits normally with JS disabled (no-JS fallback).
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            clearTimeout(debounceTimer);
            refilter();
          });
          // input fires for both text fields (per keystroke) and checkboxes.
          form.addEventListener("input", debouncedRefilter);
        }

        initGallery();
      })();
    </script>
  </body>
</html>
{{ end }}
